name: Delete Meta and Release Folders

on:
  workflow_dispatch:

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove meta and release folders
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -rf meta/ release/ 2>/dev/null || true
          git commit -m "Remove meta and release folders" || echo "No folders to delete"
          git push
